<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>五笔打字练习 - 儿童版</title>
    <style>
        /* 导入儿童友好字体 */
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Comic+Neue:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 添加可爱的背景装饰 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(129, 140, 248, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 30%, rgba(249, 115, 22, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 50% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 20%);
            z-index: -1;
        }
        
        #title {
            color: #4F46E5;
            text-align: center;
            font-family: 'Baloo 2', cursive;
            font-size: 3.5rem;
            margin: 20px 0 30px;
            text-shadow: 3px 3px 0px rgba(129, 140, 248, 0.3);
            position: relative;
            display: inline-block;
            padding: 0 20px;
        }
        
        #title::after {
            content: "✨";
            position: absolute;
            right: -30px;
            top: 10px;
            font-size: 2rem;
            animation: sparkle 2s infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        #typingArea {
            font-size: 36px;
            width: 90%;
            max-width: 1000px;
            text-align: left;
            border-radius: 24px;
            border: 4px solid #4F46E5;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 
                inset -4px -4px 12px rgba(0, 0, 0, 0.1),
                8px 8px 24px rgba(79, 70, 229, 0.2);
            margin: 0 auto 40px;
            line-height: 1.8;
            min-height: 200px;
            transition: all 0.3s ease;
        }
        
        #typingArea:hover {
            transform: translateY(-5px);
            box-shadow: 
                inset -4px -4px 12px rgba(0, 0, 0, 0.1),
                12px 12px 32px rgba(79, 70, 229, 0.3);
        }
        
        #typingArea span {
            display: inline-block;
            transition: all 0.2s ease;
        }
        
        #statusInfo {
            font-size: 28px;
            background: linear-gradient(135deg, #4F46E5, #818CF8);
            color: white;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
            border: 3px solid white;
            font-weight: 500;
            min-height: 40px;
        }
        
        #statusInfo::before {
            content: "💡";
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
        }
        
        #statusbar {
            background: linear-gradient(90deg, #F97316, #FB923C);
            color: white;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 -4px 20px rgba(249, 115, 22, 0.3);
            z-index: 1000;
            border-top: 4px solid white;
        }
        
        #statusbar::before {
            content: "🏆";
            margin-right: 10px;
            font-size: 24px;
            animation: bounce 1s infinite alternate;
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        
        .init {
            line-height: 1.8em;
            color: #1E1B4B;
            margin-right: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: rgba(238, 242, 255, 0.7);
            border: 2px solid #C7D2FE;
            transition: all 0.3s ease;
        }
        
        .cursor {
            background: linear-gradient(135deg, #10B981, #34D399);
            color: white;
            line-height: 1.8em;
            padding: 8px 12px;
            border-radius: 16px;
            box-shadow: 
                inset -2px -2px 8px rgba(0, 0, 0, 0.1),
                4px 4px 12px rgba(16, 185, 129, 0.3);
            margin-right: 12px;
            border: 3px solid white;
            animation: pulse 1.5s infinite;
            font-weight: bold;
            transform: scale(1.05);
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: inset -2px -2px 8px rgba(0, 0, 0, 0.1), 4px 4px 12px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: inset -2px -2px 8px rgba(0, 0, 0, 0.1), 6px 6px 16px rgba(16, 185, 129, 0.5); }
        }
        
        .correct {
            color: #10B981;
            line-height: 1.8em;
            background: rgba(16, 185, 129, 0.1);
            margin-right: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            border: 2px solid #10B981;
            position: relative;
            font-weight: bold;
        }
        
        .correct::after {
            content: "✓";
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #10B981;
            font-size: 18px;
            font-weight: bold;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0); }
            70% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .wrong {
            color: white;
            background: linear-gradient(135deg, #EF4444, #F87171);
            line-height: 1.8em;
            padding: 8px 12px;
            border-radius: 16px;
            margin-right: 12px;
            box-shadow: 
                inset -2px -2px 8px rgba(0, 0, 0, 0.2),
                4px 4px 12px rgba(239, 68, 68, 0.3);
            border: 3px solid white;
            position: relative;
            font-weight: bold;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .wrong::after {
            content: "✗";
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #EF4444;
            font-size: 18px;
            font-weight: bold;
            animation: popIn 0.3s ease;
        }
        
        /* 添加可爱的装饰元素 */
        .decoration {
            position: fixed;
            z-index: -1;
            font-size: 40px;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }
        
        .decoration:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .decoration:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .decoration:nth-child(3) { bottom: 30%; left: 15%; animation-delay: 2s; }
        .decoration:nth-child(4) { bottom: 20%; right: 5%; animation-delay: 3s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        /* 添加说明区域 */
        .instructions {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 1000px;
            border: 3px solid #818CF8;
            box-shadow: 0 6px 20px rgba(129, 140, 248, 0.2);
        }
        
        .instructions h3 {
            color: #4F46E5;
            font-family: 'Baloo 2', cursive;
            margin-top: 0;
            font-size: 1.8rem;
        }
        
        .instructions ul {
            padding-left: 20px;
            font-size: 1.2rem;
            color: #1E1B4B;
        }
        
        .instructions li {
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            #title {
                font-size: 2.5rem;
            }
            
            #typingArea {
                font-size: 28px;
                padding: 20px;
            }
            
            #statusInfo {
                font-size: 22px;
                padding: 15px;
            }
            
            #statusbar {
                font-size: 18px;
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            #title {
                font-size: 2rem;
            }
            
            #typingArea {
                font-size: 24px;
                padding: 15px;
            }
            
            #statusInfo {
                font-size: 18px;
                padding: 12px;
            }
            
            .instructions {
                padding: 15px;
            }
        }
    </style>
</head>

    <script>

        const fallbackWubiData = [

            { char: '饮', code: 'qnq' },
            { char: '食', code: 'wyv' },
            { char: '科', code: 'tu' },
            { char: '让', code: 'yh' },
            { char: '加', code: 'lk' },
            { char: '更', code: 'gjq' },
            { char: '利', code: 'tjh' },
            { char: '教', code: 'ftbt' },
            { char: '育', code: 'yce' },
            { char: '命', code: 'wgkb' },
            { char: '运', code: 'fcp' },
            { char: '重', code: 'tgj' },
            { char: '要', code: 's' },
            { char: '途', code: 'wgp' },
            { char: '径', code: 'tca' }
        ];

        let contents = [];
        let globalIdx = 1;
        var startTime = null;
        var currentInputCode = "";
        var characterStartTime = null; // 当前字符开始显示的时间

        // 将中文标点映射到对应的英文按键
        function mapChinesePunctuationToKey(chinesePunct) {
            const mapping = {
                "。": ".",
                "，": ",",
                "、": "\\",
                "；": ";",
                "：": ":",
                "？": "?",
                "！": "!",
                "《": ["<", ">"],
                "》": ["<", ">"],
                "（": ["(", ")"],
                "）": ["(", ")"],
                "【": ["[", "]"],
                "】": ["[", "]"],
                "｛": ["{", "}"],
                "｝": ["{", "}"]
            };
            
            return mapping[chinesePunct] || chinesePunct;
        }
        
        // 判断字符是否是ASCII字符（英文字母、数字、标点符号等）
        function isAsciiChar(char) {
            // ASCII字符的Unicode编码范围是0-127
            return char.charCodeAt(0) <= 127;
        }
        
        // 检查按键是否匹配字符（支持中文标点映射）
        function keyMatchesChar(key, char) {
            // 如果是中文标点，检查映射
            const mappedKey = mapChinesePunctuationToKey(char);
            
            if (Array.isArray(mappedKey)) {
                // 多个可能的按键（如《可以匹配<或>）
                return mappedKey.includes(key);
            } else {
                // 单个按键映射
                return key === mappedKey;
            }
        }
        
        // 判断字符是否是标点符号（包括中文标点）
        function isPunctuationChar(char) {
            // 常见标点符号的Unicode范围
            const charCode = char.charCodeAt(0);
            
            // ASCII标点: !"#$%&'()*+,-./:;<=>?@[\]^_`{|}~
            if (charCode >= 33 && charCode <= 47) return true;  // !"#$%&'()*+,-./
            if (charCode >= 58 && charCode <= 64) return true;  // :;<=>?@
            if (charCode >= 91 && charCode <= 96) return true;  // [\]^_`
            if (charCode >= 123 && charCode <= 126) return true; // {|}~
            
            // 中文标点符号范围
            // 中文标点: 。，、；：？！「」『』【】《》（）［］｛｝～·…—‘’""
            if (charCode >= 0x3000 && charCode <= 0x303F) return true; // CJK符号和标点
            if (charCode >= 0xFF00 && charCode <= 0xFFEF) {
                // 全角字符范围，包括全角标点
                // 检查常见全角标点
                const fullWidthPunctuation = "，。、；：？！「」『』【】《》（）［］｛｝～·…—‘'\"";
                return fullWidthPunctuation.includes(char);
            }
            
            // 特殊标点符号
            const specialPunctuation = "·•▪■□▲△○●★☆◆◇♠♣♥♦♪♫←↑→↓↔↕↖↗↘↙";
            if (specialPunctuation.includes(char)) return true;
            
            return false;
        }

        // 检查输入是否匹配任何编码（支持多个编码用逗号分隔）
        function matchesAnyCode(input, codesStr) {
            const codes = codesStr.split(',');
            return codes.some(code => code.toLowerCase() === input.toLowerCase());
        }

        // 检查输入是否是任何编码的前缀（支持多个编码用逗号分隔）
        function isPrefixOfAnyCode(input, codesStr) {
            const codes = codesStr.split(',');
            return codes.some(code => code.toLowerCase().startsWith(input.toLowerCase()));
        }

        // 加载五笔编码数据
        async function loadWubiData() {
            // 检查是否通过file://协议访问
            if (window.location.protocol === 'file:') {
                console.log('File protocol detected, using fallback wubi data');
                wubiData = fallbackWubiData;
                console.log(`使用后备数据: ${wubiData.length} 个字符的五笔编码`);
                return true;
            }
            
            try {
                console.log('Attempting to fetch wb86.txt');
                const response = await fetch('wb86.txt');
                console.log('Fetch response status:', response.status, response.statusText);
                
                if (!response.ok) {
                    throw new Error(`无法加载五笔编码文件: ${response.statusText}`);
                }
                
                const text = await response.text();
                console.log('Loaded text length:', text.length);
                const lines = text.split('\n').filter(line => line.trim() !== '');
                
                wubiData = lines.map(line => {
                    const [char, codes] = line.split(':');
                    return { char, code: codes };
                });
                
                console.log(`成功加载 ${wubiData.length} 个字符的五笔编码`);
                return true;
            } catch (error) {
                console.error('加载五笔编码数据失败，使用后备数据:', error);
                // 使用后备数据
                wubiData = fallbackWubiData;
                console.log(`使用后备数据: ${wubiData.length} 个字符的五笔编码`);
                return true; // 返回true，因为后备数据可用
            }
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function restart() {
            globalIdx = 1;
            currentInputCode = "";
            startTime = null;
            
            // 创建有意义的句子而不是随机字符
            const sentences = [
                "我是一名程序员，每天都在学习新的技术。",
                "中国的互联网行业发展非常迅速。",
                "学习五笔打字可以提高工作效率。",
                "今天天气很好，适合出去散步。",
                "人工智能正在改变我们的生活方式。",
                "读书可以开阔我们的视野和思维。",
                "健康的生活方式包括运动和饮食。",
                "科技的发展让生活更加便利。",
                "教育是改变命运的重要途径。",
                "环境保护是我们每个人的责任。"
            ];
            
            // 随机选择一个句子
            const randomSentence = sentences[Math.floor(Math.random() * sentences.length)];
            
            // 将句子转换为字符数组
            contents = randomSentence.split('').map(char => {
                // 查找字符对应的五笔编码
                const wubiItem = wubiData.find(item => item.char === char);
                return {
                    char: char,
                    code: wubiItem ? wubiItem.code : "???" // 如果没有找到编码，用???代替
                };
            });
            
            var idx = 0;
            const wrappedText = contents.map(item => {
                idx++;
                return `<span id="c${idx}" class="init">${item.char}</span>`;
            }).join('');

            document.getElementById('typingArea').innerHTML = wrappedText;
            document.getElementById('c1').classList.replace("init", "cursor");
            // 设置第一个字符开始显示的时间
            characterStartTime = Date.now();
            updateStatusBar();
        }

        function updateStatusBar() {
            if (globalIdx > 0 && globalIdx <= contents.length) {
                var currentChar = contents[globalIdx - 1];
                var debugInfo = "";
                
                // 调试信息：显示当前字符索引和字符
                var debugPrefix = `[${globalIdx}/${contents.length}] ${currentChar.char}: `;
                
                // 如果是ASCII字符，显示ASCII编码
                if (isAsciiChar(currentChar.char)) {
                    var asciiCode = currentChar.char.charCodeAt(0);
                    debugInfo = debugPrefix + `ASCII: ${asciiCode} (${currentChar.char}) | 直接输入字符`;
                } 
                // 如果是标点符号（包括中文标点）
                else if (isPunctuationChar(currentChar.char)) {
                    // 根据标点类型显示不同的提示
                    let keyHint = "";
                    const char = currentChar.char;
                    
                    // 常见标点的按键提示
                    if (char === "。") keyHint = "按 . 键";
                    else if (char === "，") keyHint = "按 , 键";
                    else if (char === "、") keyHint = "按 \\ 键";
                    else if (char === "；") keyHint = "按 ; 键";
                    else if (char === "：") keyHint = "按 : 键";
                    else if (char === "？") keyHint = "按 ? 键";
                    else if (char === "！") keyHint = "按 ! 键";
                    else if (char === "《" || char === "》") keyHint = "按 < 或 > 键";
                    else if (char === "（" || char === "）") keyHint = "按 ( 或 ) 键";
                    else if (char === "【" || char === "】") keyHint = "按 [ 或 ] 键";
                    else if (char === "｛" || char === "｝") keyHint = "按 { 或 } 键";
                    else keyHint = "直接按键输入";
                    
                    debugInfo = debugPrefix + `标点: ${char} | ${keyHint}`;
                }
                // 其他字符（中文汉字等），显示五笔编码
                else {
                    debugInfo = debugPrefix + `编码: ${currentChar.code} | 已输入: ${currentInputCode}`;
                }
                
                // 更新状态信息区域
                document.getElementById("statusInfo").innerHTML = debugInfo;
                
                var currentTime = Date.now();
                var timeDifferenceInSeconds = startTime ? (currentTime - startTime) / 1000 : 0;
                var correctNum = document.querySelectorAll('.correct').length;
                var errorNum = document.querySelectorAll('.wrong').length;
                var total = correctNum + errorNum;
                
                var speedInfo = "";
                if (total > 0 && timeDifferenceInSeconds > 0) {
                    var speed = total / timeDifferenceInSeconds * 60;
                    var accuracy = correctNum / total * 100;
                    var promot = "";
                    
                    // 儿童友好的鼓励信息
                    if (timeDifferenceInSeconds > 10) {
                        if (speed >= 80 && accuracy > 95) {
                            promot = "🎉 太厉害了！你是五笔小天才！ | ";
                        } else if (speed >= 60 && accuracy > 90) {
                            promot = "🌟 真棒！继续加油！ | ";
                        } else if (speed >= 40 && accuracy > 85) {
                            promot = "👍 不错哦！越来越熟练了！ | ";
                        } else if (accuracy > 80) {
                            promot = "💪 加油！你可以做得更好！ | ";
                        }
                    }
                    
                    speedInfo = `${promot}速度：${speed.toFixed(2)}字/分钟 | 正确率：${accuracy.toFixed(2)}% | 正确：${correctNum} | 错误：${errorNum} | 总字数：${total}`;
                } else {
                    speedInfo = "🎮 开始打字吧！看看你能得多少分！";
                }
                
                document.getElementById("statusbar").innerHTML = speedInfo;
            }
        }

        function showSpeed() {
            updateStatusBar();
        }

        function onePress(event) {
            if (!startTime) {
                startTime = Date.now();
            }

            // 检查当前字符
            var currentChar = contents[globalIdx - 1];
            
            // 如果是ASCII字符或标点符号（包括中文标点），直接匹配字符
            if (isAsciiChar(currentChar.char) || isPunctuationChar(currentChar.char)) {
                if (keyMatchesChar(event.key, currentChar.char)) {
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "correct");
                    moveToNextCharacter();
                } else {
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                    moveToNextCharacter();
                }
                return;
            }
            
            // 检查当前字符是否有编码，如果没有则跳过
            if (currentChar.code === "???") {
                // 没有编码的字符直接跳过
                document.getElementById('c' + globalIdx).classList.replace("cursor", "correct");
                moveToNextCharacter();
                return;
            }

            if (event.key == "Shift") {
                return;
            }

            // 处理空格键 - 强制提交当前输入
            if (event.key === ' ') {
                event.preventDefault(); // 防止页面滚动
                handleSpaceKey();
                return;
            }

            // 处理退格键
            if (event.key == 'Backspace') {
                if (currentInputCode.length > 0) {
                    // 有输入，删除最后一个字符
                    currentInputCode = currentInputCode.slice(0, -1);
                    // 更新状态栏显示当前已输入的编码
                    updateStatusBar();
                } else if (globalIdx > 1) {
                    // 没有输入且不是第一个字符，回到上一个字符
                    moveToPreviousCharacter();
                }
                return;
            }

            // 忽略其他功能键
            if (event.key.length > 1) {
                return;
            }

            var charPressed = event.key.toLowerCase();
            currentInputCode += charPressed;
            
            var currentChar = contents[globalIdx - 1];
            var correctCodes = currentChar.code;

            // 检查是否完全匹配任何编码
            if (matchesAnyCode(currentInputCode, correctCodes)) {
                // 完全匹配，正确
                document.getElementById('c' + globalIdx).classList.replace("cursor", "correct");
                moveToNextCharacter();
                return;
            }

            // 检查是否还在输入过程中（部分匹配）
            if (isPrefixOfAnyCode(currentInputCode, correctCodes)) {
                // 还在输入中，检查是否达到4个字符
                if (currentInputCode.length >= 4) {
                    // 输入了4个字符但还不匹配，错误
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                    moveToNextCharacter();
                    return;
                }
                // 继续输入
                updateStatusBar();
                return;
            }

            // 输入不匹配任何可能的编码，错误
            document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
            moveToNextCharacter();
        }

        function handleSpaceKey() {
            var currentChar = contents[globalIdx - 1];
            
            // 如果是ASCII字符或标点符号，空格键什么都不做
            if (isAsciiChar(currentChar.char) || isPunctuationChar(currentChar.char)) {
                return;
            }
            
            // 检查当前字符是否有编码，如果没有则跳过
            if (currentChar.code === "???") {
                // 没有编码的字符直接跳过
                document.getElementById('c' + globalIdx).classList.replace("cursor", "correct");
                moveToNextCharacter();
                return;
            }
            
            var correctCodes = currentChar.code;
            
            if (matchesAnyCode(currentInputCode, correctCodes)) {
                // 空格键按下时已经匹配，正确
                document.getElementById('c' + globalIdx).classList.replace("cursor", "correct");
            } else {
                // 没有匹配（无论是否有输入），错误
                document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
            }
            
            moveToNextCharacter();
        }

        function moveToPreviousCharacter() {
            // 重置当前输入
            currentInputCode = "";
            
            // 检查是否有上一个字符
            if (globalIdx > 1) {
                // 获取当前字符并重置为初始状态
                var currentElement = document.getElementById('c' + globalIdx);
                currentElement.classList.remove('correct', 'wrong', 'cursor');
                currentElement.classList.add('init');
                
                // 回到上一个字符
                globalIdx -= 1;
                
                // 获取上一个字符并重置为光标状态
                var prevElement = document.getElementById('c' + globalIdx);
                prevElement.classList.remove('correct', 'wrong', 'init');
                prevElement.classList.add('cursor');
                
                // 重置字符开始显示的时间
                characterStartTime = Date.now();
                
                // 更新统计信息
                var correctNum = document.querySelectorAll('.correct').length;
                var errorNum = document.querySelectorAll('.wrong').length;
                var total = correctNum + errorNum;
                
                // 计算速度（基于已用时间，但注意现在字数减少了）
                var currentTime = Date.now();
                var timeDifferenceInSeconds = startTime ? (currentTime - startTime) / 1000 : 0;
                
                var speedInfo = "";
                if (total > 0 && timeDifferenceInSeconds > 0) {
                    var speed = total / timeDifferenceInSeconds * 60;
                    var accuracy = correctNum / total * 100;
                    
                    // 儿童友好的鼓励信息
                    var promot = "";
                    if (timeDifferenceInSeconds > 10) {
                        if (speed >= 80 && accuracy > 95) {
                            promot = "🎉 太厉害了！你是五笔小天才！ | ";
                        } else if (speed >= 60 && accuracy > 90) {
                            promot = "🌟 真棒！继续加油！ | ";
                        } else if (speed >= 40 && accuracy > 85) {
                            promot = "👍 不错哦！越来越熟练了！ | ";
                        } else if (accuracy > 80) {
                            promot = "💪 加油！你可以做得更好！ | ";
                        }
                    }
                    
                    speedInfo = `${promot}速度：${speed.toFixed(2)}字/分钟 | 正确率：${accuracy.toFixed(2)}% | 正确：${correctNum} | 错误：${errorNum} | 总字数：${total}`;
                } else {
                    speedInfo = "🎮 开始打字吧！看看你能得多少分！";
                }
                
                document.getElementById("statusbar").innerHTML = speedInfo;
                
                // 更新状态信息
                updateStatusBar();
            }
        }

        function moveToNextCharacter() {
            // 重置当前输入
            currentInputCode = "";
            
            // 检查是否有下一个字符
            if (document.getElementById('c' + (globalIdx + 1))) {
                globalIdx += 1;
                document.getElementById('c' + globalIdx).classList.replace("init", "cursor");
                // 设置当前字符开始显示的时间
                characterStartTime = Date.now();
                // 更新状态栏（在globalIdx增加之后）
                updateStatusBar();
            } else {
                // 没有下一个字符，练习结束
                updateStatusBar(); // 更新最后一次状态
                // 显示完成消息但不阻塞
                document.getElementById("statusbar").innerHTML = "🎊 太棒了！一句完成！自动切换到下一句...";
                // 短暂延迟后重新开始，避免阻塞
                setTimeout(restart, 100);
            }
        }

        // 初始化应用
        async function initApp() {
            document.getElementById('typingArea').innerHTML = "正在加载五笔编码数据...";
            
            const loaded = await loadWubiData();
            if (loaded) {
                restart();
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>

</html>
