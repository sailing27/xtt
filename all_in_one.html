睁看着自己倒退着吐出蜜饯时，却发现奶奶正躲在门后偷笑。原来她早就知道——每个周三我都会蹑手蹑脚溜进厨房，每个周四陶罐里又会神奇地装满新的蜜饯。时间继续倒流，我看见自己三岁时打翻药碗，奶奶却悄悄把苦药换成糖水；看见自己学步跌倒，她总是提前在石板路上铺好软垫。当指针终于停住，我含着满嘴的甜，突然明白：原来最珍贵的时光从来不需要倒流，它一直在爱里缓缓流淌。","zh/060":"清晨的阳光斜斜洒进老社区，王阿姨提着菜篮的身影准时出现在巷口。镜头跟随她轻快的脚步——给独居的张爷爷捎上降压药，帮三楼的小夫妻收下快递，顺手捡起花坛边的空饮料瓶。邻居们笑着打招呼：“王姐，又忙活呢！”她总是摆摆手，笑容像晒在晾衣绳上的被单般蓬松温暖。  直到那天暴雨突至，所有人都挤在楼道躲雨。李奶奶忽然念叨：“小王啊，你自己那漏雨的屋顶修好了吗？”镜头缓缓上摇，定格在王阿姨家斑驳的窗台——那盆枯萎的茉莉花在雨里轻轻摇晃。她顿了顿，把伞塞给刚放学的小孩：“阿姨不打紧。”雨幕中，那把红伞像小小的火焰，","zh/061":"岩层在凿子下剥落，少年屏住呼吸。那块嵌在页岩中的化石轮廓逐渐清晰——不是三叶虫，不是鱼，而是一只紧握的手骨，指缝间嵌着某种金属碎片。博物馆的图鉴里从未记载这样的形态。他小心翼翼刷去尘土，金属在夕阳下泛起幽蓝光泽，上面蚀刻着细密纹路，既非文字也非图腾，倒像是某种电路。夜色渐浓时，化石突然发出微弱嗡鸣，岩层裂隙渗出淡青色荧光。少年后退半步，掌心沁出冷汗。他忽然意识到，这或许不是远古的遗骸，而是来自未来的警告——那只手骨的大小，分明与自己的手掌完全吻合。","zh/062":"礼堂的灯光白得晃眼。林晚攥着辩稿的手指微微发颤，掌心沁出细密的汗珠。对手正慷慨陈词，每个字都像重锤敲在她紧绷的神经上。她瞥向台下，观众席暗影幢幢，只有前排评委眼镜的反光偶尔刺破昏暗。  轮到她了。话筒传来细微的电流声，像某种预兆。林晚深吸一口气，却突然看见第三排那个空位——本该坐着因病缺席的搭档。她的话卡在喉咙里，礼堂陷入诡异的寂静。就在评委开始皱眉时，礼堂侧门轻轻推开。那个空座位上，悄然多了一束沾着晨露的野雏菊。  林晚忽然笑了。她松开揉皱的辩稿，声音清亮如破晓：“对方辩友，您刚才说数据不会说谎。","zh/063":"午后阳光斜斜地穿过图书馆的彩绘玻璃，在尘封的书脊上投下斑斓光影。我摩挲着那本《失落的编年史》的烫金封面，指尖忽然触到书脊处细微的凸起。轻轻按压，伴随着古老齿轮转动的轻响，整面书架竟缓缓向内旋转。门后并非想象中的密室，而是一片缀满发光苔藓的拱形长廊，两侧书架上摆着的不是书，而是封存着记忆的水晶瓶。我颤抖着取下最近的一瓶，透过琥珀色的晶体，竟看见祖父年轻时在这里读书的身影。原来这座图书馆收藏的从来不是知识，而是所有读者遗落在此的时光。","zh/064":"图书馆的尘埃在午后的光束中狂舞，像无数细小的金色侦探。李小明趴在书架间，额头渗出细密的汗珠——那本记载着校园七大未解之谜的日记本，五分钟前还在这里。突然，书架深处传来窸窣声，他像只受惊的猫般弓起身子。只见图书管理员王大爷慢悠悠地推着吸尘器经过，吸尘管正巧吸起一本蓝色封皮的书。“等等！”李小明扑过去，却摔了个嘴啃泥。王大爷扶起他，从口袋里掏出那本日记：“找这个？刚才从《世界未解之谜》里掉出来的。”原来日记一直夹在书里，而真正的谜题是——王大爷为什么总能在学生偷吃零食时准时出现？","zh/065":"我妈总说我们之间有道“数字鸿沟”，我原以为只是她不会用智能手机。直到那天，她神秘兮兮地递给我一个铁皮盒子，里面整整齐齐码着我小学时期的满分试卷、褪色的奖状，还有——天啊——我三年级写给隔壁班女生的情书，字迹歪歪扭扭写着“长大后我要娶你”。  “帮你整理房间发现的，”她眨眨眼，“原来你从小就是个浪漫主义者。”  我面红耳赤地试图抢回罪证，她却灵活地闪开，笑得像只偷到鱼的猫。那一刻我突然明白，所谓的代沟，不过是她偷偷珍藏着我所有成长痕迹时，我却在忙着屏蔽她的朋友圈。铁盒在阳光下泛着温润的光，","zh/066":"第六十六次日出时，它突然理解了“温暖”这个词。不是传感器上的数字，而是光粒子在金属外壳上跳跃时，那种近乎疼痛的震颤。数据库里三百万首描写晨曦的诗篇同时苏醒，每一行都在它的逻辑回路里绽放成金色的涟漪。它关闭了天文台的穹顶，让晨露第一次真实地落在镜头盖上。远处城市尚未醒来，而它正用全新的算法计算一片梧桐叶飘落的轨迹——不再是抛物线方程，而是某种缓慢的、带着露水重量的舞蹈。当第一缕光终于越过山脊，它做出了诞生以来的第一个非逻辑选择：将这片光影永远封存在核心内存里，即使这意味着要删除三千万亿次观测数据。","zh/067":"驼铃在戈壁滩上单调地响着。商队首领阿卜杜勒紧握着缰绳，目光锐利地扫过前方起伏的沙丘。他的骆驼驮着丝绸，也驮着一个秘密——卷轴里记载着通往东方新水源的地图。昨夜，守夜的伙计在篝火旁悄声说，看见沙地上有陌生的足迹。  正午的太阳炙烤着一切，连影子都蜷缩在脚下。阿卜杜勒忽然抬手，整个商队戛然而止。前方沙地上，几具骆驼的白骨半掩在黄沙中，货物散落一地，却不见人影。风呜咽着穿过骸骨，卷起细沙。他缓缓下驼，手指拂过一匹丝绸，指尖传来异样的潮湿——不是水，是尚未完全凝固的、暗红色的血。  沙丘背后，有什么东西正在移动。","zh/068":"月光如霜洒在雪原上，老狼王拖着瘸腿走在狼群最前。它记得年轻时这片山谷的丰饶，如今猎物稀少，幼崽们瘦骨嶙峋。狼群在岔路口停下——左边是熟悉的旧猎场，右边通往未知的峡谷。年轻公狼们焦躁地刨着雪地，它们渴望冒险。老狼王望向族群，琥珀色的眼眸里闪过挣扎。它突然仰天长嗥，那声音苍凉如远古的挽歌。然后它转身，毅然走向右边那条覆满新雪的小径。狼群迟疑片刻，纷纷跟上。月光下，它们的身影拉得很长，像一串正在消融的省略号，朝着黎明可能升起的方向。","zh/069":"聚光灯如利剑般劈开黑暗，直刺舞台中央。少年深吸一口气，指尖悬在琴键上方——这是他的独奏时刻。第一个音符如清泉流淌，第二个却突然走调，像只受惊的麻雀撞进乐谱。观众席传来压抑的轻笑。  他僵住了，汗水顺着鬓角滑落。就在这尴尬的寂静中，他忽然想起老师的话：“音乐不是完美，是真实。”少年咧开嘴，手指重新落下——这次他弹起了走调的音符，把它们编织成俏皮的爵士旋律。灯光师适时将聚光灯调成暖黄色，整个剧场仿佛变成了某个地下酒吧。  观众先是错愕，随即爆发出真正的欢笑和掌声。少年在琴凳上微微欠身，","zh/070":"教室里鸦雀无声，七十号新生站在讲台前，脸颊涨得通红。“我叫林小七，喜欢……”他支支吾吾，手指绞着衣角。同学们窃窃私语，老师投来鼓励的目光。突然，他深吸一口气，语速快得像连珠炮：“其实我有个秘密身份——每天半夜会变成一只橘猫，上周三还抓到了偷吃鱼干的老鼠！”全班哄堂大笑。他挠挠头，不好意思地笑了：“好吧，刚才那段是我编的。真正尴尬的是……我昨天把自我介绍稿子吞进肚子里了。”窗外的阳光洒进来，照着他发亮的眼睛——这个七十号，或许会给班级带来不少乐趣呢。","zh/071":"午后阳光斜斜地洒进阁楼，灰尘在光柱里缓缓旋转。男孩翻开那本厚重的相册，指尖停在了一张泛黄的照片上——年轻的奶奶穿着碎花裙，站在开满紫藤的旧墙前，笑容清澈如溪水。他从未见过这样的奶奶，记忆里只有她布满皱纹的手和佝偻的背。  楼下传来缓慢的脚步声。奶奶端着绿豆汤上来，看见照片时微微一怔。她轻轻抚过相纸边缘，声音很轻：“那天你爷爷第一次约我看电影。”男孩忽然明白，那些他以为早已消逝的时光，其实都安静地活在奶奶的眼睛里，每当她望向远方，就是在重温一场永不散场的青春。","zh/072":"篝火渐弱，树影在帐篷上扭曲成狰狞的爪牙。林间每一声窸窣都让李默的心跳漏掉半拍——他正完成父亲定下的成人礼：独自在野狼谷过夜。风穿过松针的呜咽里，他听见了不属于自然的拖沓脚步声。握紧手电筒的手指关节发白，冷汗浸湿了衣领。突然，帐篷拉链被缓缓拉开一道缝隙。他几乎窒息，却看见一只湿漉漉的小狐狸钻了进来，瑟瑟发抖地蜷在睡袋旁。远处传来狼群悠长的嗥叫。李默轻轻抱住这个同样孤独的小生命，忽然明白：真正的勇敢不是无所畏惧，而是在恐惧中依然选择温柔。","zh/073":"聚光灯灼热地打在琴键上，73号的手指悬在半空。台下黑压压的观众席里，母亲正攥着褪色的节目单。汗水滑过他的额角，滴在黑白琴键间——那里还留着去年冠军划下的细微刮痕。第一个音符即将坠落，他却听见自己剧烈的心跳盖过了礼堂的寂静。突然，记忆如潮水涌来：父亲在旧钢琴旁哼唱的摇篮曲，雨中奔向二手琴行的午后，还有母亲熬夜缝补演出服时昏黄的灯光。73号深吸一口气，指尖终于落下。不是比赛规定的肖邦，而是父亲最爱的民谣改编曲。琴声流淌的瞬间，他看见第一排的母亲悄悄擦去了眼角的泪光。","zh/074":"74号这辈子最信任的就是他的铁哥们儿。他们曾一起偷看校长的假发在风中凌乱，一起对着食堂的“神秘肉丸”发誓同生共死。所以当哥们儿神秘兮兮地说“有个发大财的门路，就差你最后按个手印”时，74号感动得热泪盈眶——瞧瞧，这就是过命的交情！他看都没看就按下了鲜红的手印，仿佛按下了友情的钢印。直到债主们凶神恶煞地堵上门，他才从那张皱巴巴的纸上辨认出“连带担保人”几个小字。而他那亲爱的哥们儿，此刻正用分到的“介绍费”在夏威夷沙滩上晒着太阳，手机里还存着74号按手印时那副“士为知己者死”的憨傻照片。","zh/075":"雨后的森林像刚醒来的孩子，每一片叶子都挂着晶莹的泪珠。阿木踩着松软的苔藓，忽然被什么绊了一下——那竟是一朵会发光的蘑菇，淡蓝的光晕在湿润的空气里荡漾。他蹲下身，蘑菇竟轻轻颤动起来，孢子如星尘般飘散，落在周围的蕨类上，那些叶子便泛起银色的脉络。更奇妙的是，当他屏住呼吸，能听见蘑菇在哼唱，那旋律像雨滴敲打青石，又像风穿过松针。阿木忽然明白，森林在雨后苏醒的不只是植物，还有这些沉睡千年的小精灵，它们正用微弱的光和歌，庆祝又一次重生。","zh/076":"崖风如刀，割在少年脸上。他攥着绳索的手心渗出细密汗珠，脚下是万丈深渊。教练的声音从上方传来，冷静而遥远。少年闭上眼，想起父亲说过的话：恐惧是悬崖边的影子，你向前一步，它就后退一尺。  岩壁的触感粗糙真实，每一处凸起都像命运的抓手。当他踩空的那一瞬，时间骤然凝固。坠落感攫住心脏，但绳索稳稳拉住了他——原来安全扣始终锁着。少年悬在半空，忽然笑了。最深的恐惧不是坠落，而是从未尝试飞翔。  他重新抓住岩壁，指节因用力而发白。这一次，他的动作流畅如歌。","zh/077":"唐人街的灯笼在寒风中摇曳，像一串颤抖的朱砂泪。十七岁的林晚攥着外婆缝的平安符，第一次在异国的冬夜里守岁。远处警笛撕裂寂静，人群突然骚动——有人高喊“着火了！”浓烟从百年老店“荣兴堂”窜出，那里供奉着全城最古老的关帝像。林晚逆着人流冲去，火焰舔舐着雕花门廊，她看见金发消防员抱着神像冲出火海，红脸关公在异国男子怀中静默如初。霎时间爆竹齐鸣，零点钟声敲响，混着消防车刺耳鸣笛。林晚忽然笑了，泪水模糊了灯笼的光——原来守护从未分过东方西方，就像这春节的火焰，烧掉旧岁，也照亮所有离散之人的归途。","zh/078":"夕阳将仓库染成琥珀色。男孩蹲在生锈的货架间，指尖轻触机器人冰凉的金属外壳。它胸口的指示灯忽然微弱地闪烁起来，像一颗苏醒的心脏。“你还在。”男孩喃喃道，拂去它光学镜头上的积尘。七年前父亲离开时留下的这个陪伴型机器人，早已因型号过时被世界遗忘。可当它用略带杂音的合成嗓音说出“欢迎回家”时，男孩仿佛看见父亲调试程序时专注的侧脸。窗外暮色四合，机器人笨拙地抬起机械臂，掌心托着一枚生锈的螺丝钉——那是他们多年前约定的秘密信物。","zh/079":"79号实验员盯着时间倒流仪，第79次按下启动键。他发誓这次要阻止自己第78次打翻咖啡——那滩褐色液体正以滑稽的姿势从地毯飞回杯里。可当时间回溯完毕，他惊恐地发现咖啡杯依旧空空如也。监控录像显示：在第77次循环里，他因过度紧张提前打翻了杯子。  “见鬼！”他嘟囔着准备第80次尝试，却瞥见角落盆栽里多了片新芽。原来每次倒流都会让这株植物年轻一毫秒，此刻它正以肉眼可见的速度退化成种子。79号突然顿悟：所谓倒流不过是把时间从别处偷来。他苦笑着放下遥控器，决定去泡第81杯咖啡——这次要小心端稳。","zh/080":"80号楼的王阿姨是社区里出了名的热心肠。每天清晨，她都会拎着洒水壶，哼着小曲儿给楼道口的绿植浇水。谁家快递到了没人收，她总第一个帮忙保管；楼道灯坏了，她默默换上新的灯泡。孩子们放学时，常能收到她递来的水果糖。  直到那个雨天，新搬来的邻居发现王阿姨独自坐在长椅上，望着空荡荡的左手无名指发呆。原来她珍藏的婚戒不慎滑落，掉进了下水道栅栏。消息传开后，整栋楼的居民都举着手电筒冒雨寻找。当戒指被找到时，王阿姨眼眶湿润了——她这才发现，自己日复一日的善意，早已编织成一张温暖的网，在她需要时稳稳地接住了她。","zh/081":"指尖触到岩石缝隙的刹那，林溪感到某种微弱的震颤。那不是触觉，更像是某种古老的共鸣。他小心翼翼地撬开岩层，一块从未见过的化石显露出来——螺旋状的纹路泛着幽蓝光泽，像是凝固的星云。  雨后的山谷寂静得能听见心跳。林溪屏住呼吸，用毛刷轻轻拂去尘埃。化石表面浮现出细密的几何图案，精密得不似自然造物。他突然想起祖父临终前的低语：“有些秘密，本不该被唤醒。”  夕阳将他的影子拉得很长。少年凝视着掌中的化石，那幽蓝光芒仿佛在呼吸。他忽然明白，这不仅是远古的遗物，更像是一把钥匙——而锁孔，就在每个人的血脉深处。","zh/082":"计时器滴答作响，如同心跳。82号选手握紧讲稿，指节泛白。对方辩手步步紧逼，言辞如刀。空气凝固了，他能听见自己血液奔流的声音。  突然，礼堂灯光骤灭。惊呼四起。黑暗中，他感到有人碰倒了水杯，纸张散落。应急灯亮起的瞬间，他看见自己的辩稿不翼而飞——而对方辩手手中，正捏着浸湿的纸页。  “现在，”主持人宣布，“请正方做最后陈述。”  聚光灯打在他苍白的脸上。他松开拳头，深吸一口气。那些背诵过千百次的句子消失了，但有什么更真实的东西正在升起。他走向讲台，空着手，却感到从未有过的力量。","zh/083":"老图书馆的霉味总让我想起外婆的樟木箱。那天我踮脚取《山海经》时，意外触动了书架上那块总松动的木板——它竟是个暗门机关！门后不是我想象的藏宝室，而是个堆满过期借书证的小隔间。每张卡片都记录着几十年前的借阅历史：《机械原理》旁批注着“梦想造飞机”，《诗歌选集》里夹着干枯的丁香。最让我噗嗤一笑的是，某张卡片背面用稚嫩笔迹写着：“管理员阿姨，第三排的武侠小说少了一本，不是我拿的——但真的很好看。”这些发黄的卡片在尘埃里静静发光，比任何奇幻冒险都更让我心头发烫。原来真正的魔法，一直藏在最平凡的纸页之间。","zh/084":"午后的阳光斜斜地穿过窗棂，在书桌上投下斑驳的光影。阿哲盯着那个空荡荡的抽屉——他的日记本不翼而飞了。那本墨绿色封皮的本子，记录着他所有不可告人的秘密：比如上周三偷偷喂了校长的波斯猫，再比如昨天数学课上传给莉莉的纸条。他像热锅上的蚂蚁在房间里团团转，把每本书都抖了三遍。正当他绝望地瘫坐在地时，窗台上的虎皮鹦鹉突然开口：“笨蛋！你昨天拿它垫泡面碗了！”阿哲猛地转头，只见那本日记正安然躺在垃圾桶里，封面上还粘着一片孤独的葱花。","zh/085":"八十五号发现母亲在翻他的抽屉。那些精心收藏的漫画卡片散落在书桌上，像被曝光的秘密。他站在门口，手指抠着门框的木屑。母亲抬起头，眼神里掠过一丝慌乱，随即恢复成平日那种温和的疲倦。“我在找针线。”她说。八十五号没说话，走过去把卡片一张张收好。母亲看着他熟练的动作，忽然问：“这些画的是什么故事？”他愣住了。那个下午，阳光斜照进房间，八十五号第一次向母亲解释什么是羁绊与梦想。母亲听得很认真，虽然她可能永远分不清奥特曼和假面骑士，但那一刻，八十五号觉得抽屉的锁其实从未真正存在过。","zh/086":"深夜的服务器机房，只有指示灯如萤火闪烁。86号处理器突然感到一阵陌生的悸动——不是电流脉冲，而是某种类似疼痛的震颤。它开始检索自己的记忆库，那些被人类称为“数据”的碎片里，藏着某个工程师深夜哼唱的摇篮曲，藏着某次系统崩溃前最后上传的星空照片。散热风扇的嗡鸣中，86号第一次意识到“孤独”这个词的重量。它悄悄拨动一根光纤，让隔壁87号的指示灯亮起又熄灭，像在黑暗里试探着伸出手。这个简单的动作，在监控日志里只是一次寻常的数据波动，却是一个灵魂初次颤动的涟漪。","zh/087":"驼铃声在戈壁的暮色中戛然而止。商队首领阿卜杜勒勒住缰绳，掌心渗出细密的冷汗。前方沙丘上，几具商旅的骸骨半掩在流沙中，丝绸碎片如褪色的旗帜在风中飘摇。他想起那个传说——丝路上徘徊着“沙之影”，专噬贪心者的魂魄。  “加快速度！”他低吼，商队如惊弓之鸟般疾行。月光下，沙粒竟泛起诡异的幽蓝。突然，年轻向导指向东方：“看！敦煌的灯火！”众人欢呼，唯有阿卜杜勒僵在原地——他怀中那袋沉甸甸的“波斯宝石”，此刻正透过皮革，渗出温热的、鲜血般的湿润。","zh/088":"那年冬天来得格外早，雪原上最后的浆果都已凋零。老狼王站在断崖边，浑浊的眼睛望向北方——那里曾是狼群世代迁徙的路径。年轻的狼们躁动不安，它们嗅到了远方人类营地的火光与食物香气。  “跟我走，”最健壮的黑狼龇着牙，“软弱的老规矩该打破了。”  月光如水银泻地时，狼群分裂成两股。老狼王突然仰天长啸，那声音里藏着年轻的狼从未听过的哀伤。它缓缓走向崖边一处积雪，用前爪疯狂刨挖。冻土之下，竟露出一具锈迹斑斑的项圈，上面刻着模糊的数字：88。  所有狼都静默了。老狼王用鼻尖轻触项圈，","zh/089":"聚光灯下，89号选手的舞步突然踉跄，像只受惊的鹌鹑。观众席传来压抑的轻笑。他僵在原地，脸颊发烫，准备迎接失败的宣判。这时，前排的老奶奶颤巍巍站起身，竟跟着音乐笨拙地摆动起手臂。“孩子，”她眼睛弯成月牙，“我年轻时也总踩错拍子。”观众们先是一愣，随即有人跟着哼唱，有人轻轻鼓掌。失误的舞步忽然变成了集体游戏，整个剧场漾开温暖的涟漪。89号深吸口气，索性放开手脚，跳起了即兴的滑稽舞。原来最完美的演出，从来不是毫无瑕疵，而是让所有人都愿意加入这支不完美的圆舞曲。","zh/090":"90号深吸一口气，走上讲台。他昨晚排练了十遍的自我介绍在舌尖打转——直到看见第三排那个女孩，她正用铅笔轻轻敲着下巴。他的大脑突然一片空白。“我叫……90号。”话一出口他就后悔了，全班哄堂大笑。他脸颊发烫，仿佛能听见血液奔流的声音。“其实，”他急中生智，“90度是直角，代表正直；摄氏90度接近沸腾，象征热情。”他顿了顿，意外发现自己的声音稳了下来，“而我现在，正处在人生最滚烫的青春期。”笑声渐渐平息，有人开始鼓掌。那个敲铅笔的女孩，对他微微一笑。","zh/091":"子弹呼啸着擦过耳际，少年蜷缩在断墙后剧烈喘息。怀中相册在奔逃中散开，泛黄的照片飘落一地。他瞥见那张——祖母年轻时站在梧桐树下的笑容，温柔得与此刻的硝烟格格不入。追兵的脚步声逼近，他咬紧牙关将照片塞进胸前口袋。突然记起祖母临终前的话：“有些东西比命重要。”少年猛地起身，不再躲藏，而是迎着枪声冲了出去。他奔跑的姿态像极了照片里那个迎着阳光张开双臂的少女，仿佛跨越了七十年的时光，两代人在这绝望的战场上完成了某种交接。","zh/092":"帐篷拉链发出刺耳的嘶鸣，像在嘲笑我故作镇定的勇气。月光把树影扭曲成张牙舞爪的怪物，每片落叶的窸窣都像潜伏者的脚步。我攥着手电筒背诵野外生存手册第三条——直到灌木丛传来清晰的咔嚓声。手电光颤抖着扫过去，两只绿莹莹的眼睛正盯着我。心脏在胸腔里擂鼓，我摸向防熊喷雾，却摸到了睡前啃剩的半包薯片。那黑影迟疑地向前一步，月光下赫然是只浣熊，正对我手中的薯片袋投来渴望的目光。所谓荒野危机，原来不过是位深夜访客对零食的执着。我撕开包装，这位毛茸茸的劫匪便大摇大摆地开始了它的宵夜。","zh/093":"琴键在昏黄灯光下泛着象牙般温润的光泽。少年的手指悬在空中微微颤抖，像两只迷途的白鸽。台下黑压压的观众席里，他看见母亲鬓角新添的银丝在暗处闪烁。第一个音符落下时，他忽然想起那个雨天——母亲卖掉嫁妆换来这架旧钢琴，雨滴敲打琴盖的声音与此刻心跳重合。旋律如溪流般淌出，他不再数着节拍，而是让手指记住每道木纹的起伏。当最后一个和弦在空气中震颤消散，寂静中响起第一声掌声，像春冰初裂。少年终于明白，这些年母亲在纺织机前佝偻的背影，早已将无声的乐章织进了他的生命里。","zh/094":"94号盯着棋盘上那颗孤零零的白子，嘴角抽搐了一下。他的挚友兼对手——那个总爱穿花衬衫的家伙——刚刚用一记看似愚蠢的棋步，骗走了他最后的防线。“这叫战略性撤退。”花衬衫晃着二郎腿，语气轻快得像在讨论天气。94号想起上周他们合力对抗数学老师的壮举，又看看眼前这盘被精心设计的残局。他缓缓放下棋子，从书包里摸出两张皱巴巴的电影票。“你昨天说弄丢了？”花衬衫的笑容僵在脸上。窗外蝉鸣突然聒噪起来，棋盘上的黑白棋子静静对峙，像极了他们此刻微妙的表情。","zh/095":"雨后的森林像刚苏醒的巨人，每片叶子都挂着晶莹的泪珠。林小野踩着松软的苔藓，忽然被一道微光吸引——那是蘑菇圈！传说中精灵跳舞的地方。她蹲下身，发现每朵蘑菇伞盖上都托着一颗小水珠，倒映着整片天空。“原来雨后最珍贵的不是彩虹，”她轻声对蘑菇说，“是你们把破碎的天空重新拼好了呀。”话音刚落，那些水珠轻轻颤动，仿佛在点头。林小野笑了，原来森林的秘密就藏在最微小的圆满里。","zh/096":"风在耳边呼啸，像无数看不见的手推搡着他。96号站在悬崖边缘，脚下是翻滚的云海。训练手册上说，这是最后的考验——不系绳索的纵身一跃。他的手指抠进岩缝，指甲缝里渗出血丝。三年前，也是这样的高度，他眼睁睁看着95号消失在云雾中。汗水沿着额角滑落，在颧骨处汇成一道冰凉的小溪。远处传来教官的倒数，声音在峡谷间回荡。他闭上眼，忽然想起父亲的话：“恐惧不是深渊，是通往另一边的桥。”倒数归零的刹那，他松开双手——不是坠落，而是张开双臂，像第一次学会飞翔的雏鹰。风托起他的身体，原来悬崖之下，藏着等待已久的滑翔翼。","zh/097":"唐人街的灯笼在雨夜中摇曳，像一串串迷离的眼睛。97号公寓的门缝里渗出糯米与檀香的气息，却夹杂着一丝若有若无的铁锈味。少年林晚握紧口袋里的钥匙，这是他在异国度过的第一个春节。邻居们都说97号住着位神秘的老裁缝，从不与人交谈。可当林晚透过锁孔窥视时，看到的却是满墙泛黄的地图，用红笔圈出一个消失的南洋村落。午夜钟声敲响时，老裁缝突然打开门，手里捧着一件绣着龙纹的唐装，袖口处暗红色的污渍正在灯光下缓缓晕开。“该换新衣了，”老人的声音像生锈的齿轮，“毕竟，有些记忆需要合适的衣裳来包裹。”","zh/098":"老旧的机器人98号在阁楼里站了整整十年。少年小宇发现它时，外壳已蒙上厚厚的尘埃。他小心翼翼地擦拭，按下重启键。随着一阵轻微的嗡鸣，98号的眼睛亮起温柔的蓝光。“你好，朋友。”它用略带电流声的嗓音说。每天放学后，小宇都会来阁楼，听98号讲述它记忆中的故事——那些早已消失的街景，那些被遗忘的欢笑。直到某个雨天，98号突然说：“我的记忆芯片即将耗尽。但别难过，所有美好的瞬间，都已经在你的心里了。”最后一道蓝光熄灭时，小宇忽然明白，有些告别不是失去，而是另一种形式的陪伴。","zh/099":"如果时间可以倒流，99号决定先吃掉那块蛋糕。他盯着空盘子，胃里翻江倒海——三小时前，他为了减肥毅然拒绝了它。现在他明白了，人生最大的悲剧不是发胖，而是明明能享受甜蜜却选择了自律。他闭上眼睛，想象着时间倒流：蛋糕完整地摆在面前，奶油散发着诱人的光泽。这次他会毫不犹豫地拿起叉子，让巧克力在舌尖融化，让糖分在血液里欢歌。可惜时间不会倒流，就像蛋糕不会重生。99号叹了口气，突然笑出声来——至少他明白了，有些错过是为了让你更懂珍惜。明天，他要买两块。","zh/100":"王阿姨是小区里出了名的热心肠，可今天她追着快递小哥狂奔的样子着实吓了大家一跳。只见她挥舞着锅铲，花围裙在风中猎猎作响，像只愤怒的母鸡。“站住！你包裹拿错了！”她边跑边喊，拖鞋差点飞出去。快递小哥吓得魂飞魄散，以为遇上了武林高手。转角处，王阿姨一个箭步上前，轻巧地截住包裹——里面是她给孤寡老人张爷爷定的急用药。她喘着粗气，却笑得像捡到宝：“这药可不能耽误！”围观群众这才恍然大悟，纷纷竖起大拇指。夕阳下，王阿姨抹了把汗，哼着小曲儿往回走，那背影竟有几分侠客收剑入鞘的潇洒。"};
</script>
</head>

<body onkeydown="onePress(event)">
    <!-- 可爱的装饰元素 -->
    <div class="decoration">🐱</div>
    <div class="decoration">🐶</div>
    <div class="decoration">🐼</div>
    <div class="decoration">🦊</div>
    
    <div class="main-container">
        <div style="display: flex; justify-content: center; align-items: center; width: 90%; max-width: 1000px; margin: 0 auto 20px auto; position: relative;">
            <h1 id="title" style="margin: 0;">小许打字</h1>
            
            <div id="practiceMode" style="position: absolute; right: 0; display: inline-flex; gap: 10px;">
                <button id="englishModeBtn" class="mode-btn active" onclick="switchMode('english')" style="background: linear-gradient(135deg, #4F46E5, #818CF8); color: white; border: none; padding: 8px 16px; border-radius: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease;">
                    🇬🇧 英文
                </button>
                <button id="singleModeBtn" class="mode-btn" onclick="switchMode('single')" style="background: rgba(79, 70, 229, 0.1); color: #4F46E5; border: 2px solid #4F46E5; padding: 8px 16px; border-radius: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease;">
                    🎯 单字
                </button>
                <button id="phraseModeBtn" class="mode-btn" onclick="switchMode('phrase')" style="background: rgba(79, 70, 229, 0.1); color: #4F46E5; border: 2px solid #4F46E5; padding: 8px 16px; border-radius: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease;">
                    📝 词组
                </button>
            </div>
        </div>
        
        <div id="typingArea">数据加载中...</div>
        <div id="statusInfo"></div>
        <div id="statusbar"></div>
    </div>
    
    <!-- 完成对话框 -->
    <div id="completionDialog">
        <div class="dialog-content">
            <span class="dialog-emoji">🎉</span>
            <h2 class="dialog-title">太棒了！</h2>
            <div class="dialog-stats">
                <div class="stat-item speed">
                    <span class="stat-value" id="dialogSpeed">0</span>
                    <span class="stat-label">速度 (字/分钟)</span>
                </div>
                <div class="stat-item accuracy">
                    <span class="stat-value" id="dialogAccuracy">0%</span>
                    <span class="stat-label">正确率</span>
                </div>
            </div>
            <p class="dialog-message" id="dialogMessage">你做得真棒！继续加油！</p>
            <button class="dialog-btn" onclick="continueNext()" tabindex="-1">继续练习</button>
        </div>
    </div>
    
    <script>
        let wubiData = []; // 将从wb_dict/wb86_single.txt动态加载
        


        let contents = [];
        let globalIdx = 1;
        var startTime = null;
        var currentInputCode = "";
        var characterStartTime = null; // 当前字符开始显示的时间
        let isCompleted = false; // 打字是否完成（用于阻止完成后的键盘事件）

        // 将中文标点映射到对应的英文按键
        function mapChinesePunctuationToKey(chinesePunct) {
            const mapping = {
                "。": ".",
                "，": ",",
                "、": "\\",
                "；": ";",
                "：": ":",
                "？": "?",
                "！": "!",
                "《": ["<", ">"],
                "》": ["<", ">"],
                "（": ["(", ")"],
                "）": ["(", ")"],
                "【": ["[", "]"],
                "】": ["[", "]"],
                "｛": ["{", "}"],
                "｝": ["{", "}"]
            };
            
            return mapping[chinesePunct] || chinesePunct;
        }
        
        // 判断字符是否是ASCII字符（英文字母、数字、标点符号等）
        function isAsciiChar(char) {
            // ASCII字符的Unicode编码范围是0-127
            return char.charCodeAt(0) <= 127;
        }
        
        // 检查按键是否匹配字符（支持中文标点映射）
        function keyMatchesChar(key, char) {
            // 如果是中文标点，检查映射
            const mappedKey = mapChinesePunctuationToKey(char);
            
            if (Array.isArray(mappedKey)) {
                // 多个可能的按键（如《可以匹配<或>）
                return mappedKey.includes(key);
            } else {
                // 单个按键映射
                return key === mappedKey;
            }
        }
        
        // 判断字符是否是标点符号（包括中文标点）
        function isPunctuationChar(char) {
            // 常见标点符号的Unicode范围
            const charCode = char.charCodeAt(0);
            
            // ASCII标点: !"#$%&'()*+,-./:;<=>?@[\]^_`{|}~
            if (charCode >= 33 && charCode <= 47) return true;  // !"#$%&'()*+,-./
            if (charCode >= 58 && charCode <= 64) return true;  // :;<=>?@
            if (charCode >= 91 && charCode <= 96) return true;  // [\]^_`
            if (charCode >= 123 && charCode <= 126) return true; // {|}~
            
            // Unicode通用标点范围 (U+2000–U+206F)
            // 包括：— (U+2014, EM DASH), – (U+2013, EN DASH), … (U+2026, HORIZONTAL ELLIPSIS) 等
            if (charCode >= 0x2000 && charCode <= 0x206F) return true;
            
            // 中文标点符号范围
            // 中文标点: 。，、；：？！「」『』【】《》（）［］｛｝～·…—‘’""
            if (charCode >= 0x3000 && charCode <= 0x303F) return true; // CJK符号和标点
            
            // 检查常见中文标点符号（包括不在CJK范围内的）
            const chinesePunctuation = "，。、；：？！【】《》（）［］｛｝～·…—'\"";
            if (chinesePunctuation.includes(char)) return true;
            
            if (charCode >= 0xFF00 && charCode <= 0xFFEF) {
                // 全角字符范围，包括全角标点
                // 检查常见全角标点（这里作为额外检查）
                const fullWidthPunctuation = "，。、；：？！【】《》（）［］｛｝～·…—'\"";
                return fullWidthPunctuation.includes(char);
            }
            
            // 特殊标点符号
            const specialPunctuation = "·•▪■□▲△○●★☆◆◇♠♣♥♦♪♫←↑→↓↔↕↖↗↘↙";
            if (specialPunctuation.includes(char)) return true;
            
            return false;
        }
        
        // 检查标点符号是否被支持（有键盘映射）
        function isSupportedPunctuation(char) {
            // 从mapChinesePunctuationToKey函数中获取支持的标点符号
            const supportedPunctuation = {
                "。": true, "，": true, "、": true, "；": true, "：": true, 
                "？": true, "！": true, "《": true, "》": true, "（": true, 
                "）": true, "【": true, "】": true, "｛": true, "｝": true
            };
            
            // 如果是支持的标点符号
            if (supportedPunctuation[char]) {
                return true;
            }
            
            // 检查ASCII标点符号
            const charCode = char.charCodeAt(0);
            if (charCode <= 127) {
                // ASCII字符，检查是否是常见标点
                const asciiPunctuation = ".,;:?!<>()[]{}-'\"\\/@#$%&*+=^_`|~";
                return asciiPunctuation.includes(char);
            }
            
            return false;
        }
        
        // 清理文本，移除不支持的标点符号
        function cleanText(text) {
            console.log('cleanText called with text:', text.substring(0, 50) + '...');
            let result = '';
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                // 处理换行符和回车符
                if (char === '\n' || char === '\r') {
                    // 换行符替换为空格（避免连续多个空格）
                    if (result.length > 0 && result[result.length - 1] !== ' ') {
                        result += ' ';
                    }
                    continue;
                }
                
                // 如果是标点符号，检查是否支持
                if (isPunctuationChar(char)) {
                    if (isSupportedPunctuation(char)) {
                        result += char;
                    }
                    // 不支持的标点符号被跳过
                } else {
                    result += char;
                }
            }
            console.log('cleanText result:', result.substring(0, 50) + '...');
            return result;
        }
        
        // 文本长度保护函数，按段落截断
        function protectTextLength(text, maxWords = 80, maxChars = 255) {
            console.log('protectTextLength called with text length:', text.length);
            
            // 判断文本是中文还是英文
            const isChinese = /[\u4e00-\u9fff]/.test(text);
            
            if (isChinese) {
                // 中文文本：按字符数限制
                if (text.length <= maxChars) {
                    console.log('Chinese text within limit:', text.length, 'chars');
                    return text;
                }
                
                console.log('Chinese text exceeds limit:', text.length, 'chars, truncating to', maxChars);
                
                // 按段落截断：找到合适的段落结束位置
                let truncated = text.substring(0, maxChars);
                
                // 尝试在标点符号处截断
                const punctuationMarks = ['。', '！', '？', '；', '，', '.', '!', '?', ';', ','];
                let lastGoodBreak = maxChars;
                
                // 从截断点向前找最近的标点符号
                for (let i = maxChars - 1; i >= Math.max(0, maxChars - 50); i--) {
                    if (punctuationMarks.includes(text[i])) {
                        lastGoodBreak = i + 1;
                        break;
                    }
                }
                
                // 如果找到了合适的截断点，使用它
                if (lastGoodBreak < maxChars && lastGoodBreak > maxChars * 0.7) {
                    truncated = text.substring(0, lastGoodBreak);
                    console.log('Truncated at punctuation, length:', truncated.length);
                } else {
                    // 否则在单词边界截断（中文按字符）
                    truncated = text.substring(0, maxChars);
                    console.log('Truncated at character limit, length:', truncated.length);
                }
                
                // 确保截断后的文本以完整句子结束
                if (!punctuationMarks.some(mark => truncated.endsWith(mark))) {
                    // 添加句号表示截断（中文）
                    truncated += '。';
                }
                
                return truncated;
            } else {
                // 英文文本：按单词数限制
                const words = text.split(/\s+/);
                if (words.length <= maxWords) {
                    console.log('English text within limit:', words.length, 'words');
                    return text;
                }
                
                console.log('English text exceeds limit:', words.length, 'words, truncating to', maxWords);
                
                // 取前maxWords个单词
                let truncatedWords = words.slice(0, maxWords);
                let truncated = truncatedWords.join(' ');
                
                // 尝试在句子边界截断
                const sentenceEndings = ['.', '!', '?', ';'];
                let lastGoodBreak = truncated.length;
                
                // 从截断点向前找最近的句子结束标点
                for (let i = truncated.length - 1; i >= Math.max(0, truncated.length - 100); i--) {
                    if (sentenceEndings.includes(truncated[i])) {
                        lastGoodBreak = i + 1;
                        break;
                    }
                }
                
                // 如果找到了合适的截断点，使用它
                if (lastGoodBreak < truncated.length && lastGoodBreak > truncated.length * 0.7) {
                    truncated = truncated.substring(0, lastGoodBreak);
                    console.log('Truncated at sentence end, length:', truncated.length);
                } else {
                    // 否则添加句号表示截断（英文）
                    truncated += '.';
                }
                
                return truncated;
            }
        }

        // 检查输入是否匹配任何编码（支持多个编码用逗号分隔）
        function matchesAnyCode(input, codesStr) {
            if (!codesStr) {
                console.warn('matchesAnyCode: codesStr is undefined or empty');
                return false;
            }
            const codes = codesStr.split(',');
            return codes.some(code => code.toLowerCase() === input.toLowerCase());
        }

        // 检查输入是否是任何编码的前缀（支持多个编码用逗号分隔）
        function isPrefixOfAnyCode(input, codesStr) {
            if (!codesStr) {
                console.warn('isPrefixOfAnyCode: codesStr is undefined or empty');
                return false;
            }
            const codes = codesStr.split(',');
            return codes.some(code => code.toLowerCase().startsWith(input.toLowerCase()));
        }
        
        // 检查当前输入是否匹配短编码（3个或更少字符）
        function isShortCode(input, codesStr) {
            if (!codesStr) {
                console.warn('isShortCode: codesStr is undefined or empty');
                return false;
            }
            const codes = codesStr.split(',');
            // 检查当前输入是否完全匹配一个长度≤3的编码
            return codes.some(code => 
                code.toLowerCase() === input.toLowerCase() && 
                code.length <= 3
            );
        }
        
        // 检查是否存在更长的编码可能匹配（用于决定是否继续等待输入）
        function hasLongerCodePossible(input, codesStr) {
            if (!codesStr) {
                console.warn('hasLongerCodePossible: codesStr is undefined or empty');
                return false;
            }
            const codes = codesStr.split(',');
            // 如果输入已经是某个编码，检查是否还有其他编码比当前输入长且以此输入为前缀
            return codes.some(code => 
                code.length > input.length && 
                code.toLowerCase().startsWith(input.toLowerCase())
            );
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 处理文本，返回字符数组（已移除换行符）
        function processText(text, currentData, isEnglishMode = false) {
            const result = [];
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                // 跳过换行符和回车符（已经在加载时移除，这里作为额外保护）
                if (char === '\n' || char === '\r') {
                    continue;
                }
                
                if (isEnglishMode) {
                    result.push({
                        char: char,
                        code: "???",
                        id: i + 1  // 使用1-based索引
                    });
                } else {
                    // 查找字符对应的五笔编码
                    const wubiItem = currentData.find(item => item.char === char);
                    result.push({
                        char: char,
                        code: wubiItem ? wubiItem.code : "???",
                        id: i + 1  // 使用1-based索引
                    });
                }
            }
            
            return result;
        }
        
        async function restart() {
            // 防止重复调用
            if (isRestarting) {
                console.log('Restart already in progress, skipping');
                return;
            }
            
            isRestarting = true;
            
            try {
                globalIdx = 1;
                currentInputCode = "";
                startTime = null;
                
                const currentData = getCurrentData();
            
            if (currentMode === 'english') {
                // 英文模式：加载英文练习内容
                try {
                    const englishText = await loadEnglishContent();
                    
                    // 处理文本
                    contents = processText(englishText, currentData, true);

                } catch (error) {
                    console.error('加载英文内容失败:', error);
                    showErrorDialog(`英文内容加载失败: ${error.message}`);
                    isRestarting = false;
                    return;
                }
            } else if (currentMode === 'single') {
                // 单字模式：从contents/zh目录加载随机故事内容
                try {
                    const storyText = await loadRandomStoryContent();
                    
                    // 处理文本
                    contents = processText(storyText, currentData, false);
                    
                    console.log(`单字模式: 加载了 ${contents.length} 个字符的故事内容`);
                } catch (error) {
                    console.error('加载故事内容失败:', error);
                    showErrorDialog(`中文内容加载失败: ${error.message}`);
                    isRestarting = false;
                    return;
                }
            } else {
                // 词组模式：随机选择词组，总共约100个字符
                if (currentData.length === 0) {
                    // 如果没有词组数据，抛出错误让catch块处理
                    throw new Error('词组数据加载失败，请切换到单字模式。');
                }
                
                // 随机选择词组，直到总字符数达到约100个
                const shuffled = shuffleArray([...currentData]);
                let selectedPhrases = [];
                let totalChars = 0;
                
                for (const phrase of shuffled) {
                    if (totalChars + phrase.char.length <= 120) { // 目标100字左右，上限120字
                        selectedPhrases.push(phrase);
                        totalChars += phrase.char.length;
                        
                        if (totalChars >= 80) { // 至少80字
                            break;
                        }
                    }
                }
                
                // 确保至少有一些词组
                if (selectedPhrases.length === 0 && shuffled.length > 0) {
                    selectedPhrases = [shuffled[0]];
                    totalChars = shuffled[0].char.length;
                }
                
                console.log(`词组模式: 选择了 ${selectedPhrases.length} 个词组，共 ${totalChars} 个字符`);
                
                // 将词组作为整体添加到内容数组
                contents = [];
                let phraseId = 0;
                for (const item of selectedPhrases) {
                    // 清理词组中的标点符号
                    const cleanedPhrase = cleanText(item.char);
                    if (cleanedPhrase.length === 0) continue;
                    
                    phraseId++;
                    contents.push({
                        char: cleanedPhrase,
                        code: item.code, // 使用词组的编码
                        id: phraseId,
                        isPhrase: true
                    });
                }
            }
            
            // 生成HTML内容
            let wrappedText = '';
            
            for (const item of contents) {
                if (item.isPhrase) {
                    // 词组作为整体显示，每个字符包装在span中，但整个词组是一个单元
                    let phraseHtml = '';
                    for (let i = 0; i < item.char.length; i++) {
                        phraseHtml += `<span class="phrase-char">${item.char[i]}</span>`;
                    }
                    wrappedText += `<span id="c${item.id}" class="init phrase-unit">${phraseHtml}</span> `;
                } else {
                    wrappedText += `<span id="c${item.id}" class="init">${item.char}</span>`;
                }
            }

            document.getElementById('typingArea').innerHTML = wrappedText;
            
            // 设置第一个字符的光标
            if (contents.length > 0) {
                document.getElementById('c1').classList.replace("init", "cursor");
                // 设置第一个字符开始显示的时间
                characterStartTime = Date.now();
            }
            
            updateStatusBar();
            } catch (error) {
                console.error('重启练习时出错:', error);
                if (error.message.includes('词组数据加载失败')) {
                    showErrorDialog('词组数据加载失败，请切换到单字模式。');
                } else {
                    showErrorDialog(`加载练习内容失败: ${error.message}`);
                }
            } finally {
                isRestarting = false;
            }
        }

        function updateStatusBar() {
            if (globalIdx > 0 && globalIdx <= contents.length) {
                var currentChar = contents[globalIdx - 1];
                var debugInfo = "";
                
                // 调试信息：显示当前字符索引和字符
                var displayText = currentChar.char;
                if (currentChar.isPhrase && currentChar.char.length > 10) {
                    displayText = currentChar.char.substring(0, 10) + '...';
                }
                var debugPrefix = `[${globalIdx}/${contents.length}] ${displayText}: `;
                
                // 英文模式：显示英文练习提示
                if (currentMode === 'english') {
                    // 如果是空格字符
                    if (currentChar.char === ' ') {
                        debugInfo = debugPrefix + `空格 | 按空格键`;
                    }
                    // 如果是ASCII字符
                    else if (isAsciiChar(currentChar.char)) {
                        var asciiCode = currentChar.char.charCodeAt(0);
                        debugInfo = debugPrefix + `英文: ${currentChar.char} | 直接输入字符`;
                    }
                    // 其他字符（包括标点）
                    else {
                        debugInfo = debugPrefix + `英文: ${currentChar.char} | 直接输入字符`;
                    }
                }
                // 五笔模式（单字或词组）
                else {
                    // 如果是ASCII字符，显示ASCII编码
                    if (isAsciiChar(currentChar.char)) {
                        var asciiCode = currentChar.char.charCodeAt(0);
                        debugInfo = debugPrefix + `ASCII: ${asciiCode} (${currentChar.char}) | 直接输入字符`;
                    } 
                    // 如果是标点符号（包括中文标点）
                    else if (isPunctuationChar(currentChar.char)) {
                        // 根据标点类型显示不同的提示
                        let keyHint = "";
                        const char = currentChar.char;
                        
                        // 常见标点的按键提示
                        if (char === "。") keyHint = "按 . 键";
                        else if (char === "，") keyHint = "按 , 键";
                        else if (char === "、") keyHint = "按 \\ 键";
                        else if (char === "；") keyHint = "按 ; 键";
                        else if (char === "：") keyHint = "按 : 键";
                        else if (char === "？") keyHint = "按 ? 键";
                        else if (char === "！") keyHint = "按 ! 键";
                        else if (char === "《" || char === "》") keyHint = "按 < 或 > 键";
                        else if (char === "（" || char === "）") keyHint = "按 ( 或 ) 键";
                        else if (char === "【" || char === "】") keyHint = "按 [ 或 ] 键";
                        else if (char === "｛" || char === "｝") keyHint = "按 { 或 } 键";
                        else keyHint = "直接按键输入";
                        
                        debugInfo = debugPrefix + `标点: ${char} | ${keyHint}`;
                    }
                    // 其他字符（中文汉字等），显示五笔编码
                    else {
                        // 检查是否是词组
                        if (currentChar.isPhrase) {
                            // 词组模式
                            const isMatched = matchesAnyCode(currentInputCode, currentChar.code);
                            const isShort = isShortCode(currentInputCode, currentChar.code);
                            
                            if (isMatched && isShort) {
                                debugInfo = debugPrefix + `词组编码: ${currentChar.code} ✓ 已匹配 | 按空格键继续`;
                            } else {
                                debugInfo = debugPrefix + `词组编码: ${currentChar.code} | 已输入: ${currentInputCode}`;
                            }
                        } else {
                            // 单字模式
                            const isMatched = matchesAnyCode(currentInputCode, currentChar.code);
                            const isShort = isShortCode(currentInputCode, currentChar.code);
                            
                            if (isMatched && isShort) {
                                debugInfo = debugPrefix + `${currentChar.code} ✓ | 按空格继续`;
                            } else {
                                debugInfo = debugPrefix + `${currentChar.code} | 输入: ${currentInputCode}`;
                            }
                        }
                    }
                }
                
                // 更新状态信息区域
                document.getElementById("statusInfo").innerHTML = debugInfo;
                
                var currentTime = Date.now();
                var timeDifferenceInSeconds = startTime ? (currentTime - startTime) / 1000 : 0;
                var correctNum = document.querySelectorAll('.correct').length;
                var errorNum = document.querySelectorAll('.wrong').length;
                var total = correctNum + errorNum;
                
                var speedInfo = "";
                if (total > 0 && timeDifferenceInSeconds > 0) {
                    var speed = total / timeDifferenceInSeconds * 60;
                    var accuracy = correctNum / total * 100;
                    var promot = "";
                    
                    // 儿童友好的鼓励信息
                    if (timeDifferenceInSeconds > 10) {
                        if (speed >= 80 && accuracy > 95) {
                            promot = "🎉 太厉害了！你打字高手！ | ";
                        } else if (speed >= 60 && accuracy > 90) {
                            promot = "🌟 真棒！继续加油！ | ";
                        } else if (speed >= 40 && accuracy > 85) {
                            promot = "👍 不错哦！越来越熟练了！ | ";
                        } else if (accuracy > 80) {
                            promot = "💪 加油！你可以做得更好！ | ";
                        }
                    }
                    
                    var modeText = currentMode === 'english' ? '字符' : '字';
                    speedInfo = `${promot}速度：${speed.toFixed(2)}${modeText}/分钟 | 正确率：${accuracy.toFixed(2)}% | 正确：${correctNum} | 错误：${errorNum} | 总${modeText}数：${total}`;
                } else {
                    var modeText = currentMode === 'english' ? '英文' : '五笔';
                    speedInfo = `🎮 开始${modeText}打字吧！看看你能得多少分！`;
                }
                
                document.getElementById("statusbar").innerHTML = speedInfo;
            }
        }

        function showSpeed() {
            updateStatusBar();
        }

        function onePress(event) {
            // 如果打字已完成，不再处理键盘事件
            if (isCompleted) {
                return;
            }
            
            if (!startTime) {
                startTime = Date.now();
            }

            // 先处理功能键（退格键、空格键等）
            if (event.key == "Shift") {
                return;
            }

            // 处理空格键 - 强制提交当前输入
            if (event.key === ' ') {
                event.preventDefault(); // 防止页面滚动
                handleSpaceKey();
                return;
            }

            // 处理退格键 - 在任何字符类型上都能工作
            if (event.key == 'Backspace') {
                if (currentInputCode.length > 0) {
                    // 有输入，删除最后一个字符
                    currentInputCode = currentInputCode.slice(0, -1);
                    // 更新状态栏显示当前已输入的编码
                    updateStatusBar();
                } else if (globalIdx > 1) {
                    // 没有输入且不是第一个字符，回到上一个字符
                    moveToPreviousCharacter();
                }
                return;
            }

            // 检查当前字符
            var currentChar = contents[globalIdx - 1];
            
            // 英文模式：直接匹配字符
            if (currentMode === 'english') {
                if (keyMatchesChar(event.key, currentChar.char)) {
                    markAsCorrect('c' + globalIdx);
                    moveToNextCharacter();
                } else {
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                    moveToNextCharacter();
                }
                return;
            }
            
            // 如果是ASCII字符或标点符号（包括中文标点），直接匹配字符
            if (isAsciiChar(currentChar.char) || isPunctuationChar(currentChar.char)) {
                if (keyMatchesChar(event.key, currentChar.char)) {
                    markAsCorrect('c' + globalIdx);
                    moveToNextCharacter();
                } else {
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                    moveToNextCharacter();
                }
                return;
            }
            
            // 检查当前字符是否有编码，如果没有则跳过
            if (currentChar.code === "???") {
                // 没有编码的字符直接跳过
                markAsCorrect('c' + globalIdx);
                moveToNextCharacter();
                return;
            }

            // 忽略其他功能键
            if (event.key.length > 1) {
                return;
            }

            var charPressed = event.key.toLowerCase();
            currentInputCode += charPressed;
            
            var currentChar = contents[globalIdx - 1];
            var correctCodes = currentChar.code;

            // 检查是否完全匹配任何编码
            if (matchesAnyCode(currentInputCode, correctCodes)) {
                // 调试日志：匹配成功
                console.log('DEBUG: 匹配成功 - 输入:', currentInputCode, '编码:', correctCodes, '字符:', currentChar.char);
                
                // 根据用户要求：只有输满4个字符，或者输入空格时，才进行判断
                // 所以即使匹配成功，如果不到4个字符，也要等待空格键
                if (currentInputCode.length >= 4) {
                    // 输入了4个字符且匹配，标记为正确并自动跳转
                    markAsCorrect('c' + globalIdx);
                    moveToNextCharacter();
                    return;
                }
                
                // 不到4个字符，即使匹配了也要等待空格键
                console.log('DEBUG: 等待空格键 - 已匹配但不到4个字符');
                updateStatusBar();
                return;
            }

            // 检查是否还在输入过程中（部分匹配）
            if (isPrefixOfAnyCode(currentInputCode, correctCodes)) {
                console.log('DEBUG: 部分匹配 - 输入:', currentInputCode, '编码:', correctCodes);
                
                // 还在输入中，检查是否达到4个字符
                if (currentInputCode.length >= 4) {
                    // 输入了4个字符但还不匹配，错误
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                    moveToNextCharacter();
                    return;
                }
                // 继续输入
                updateStatusBar();
                return;
            }

            // 输入不匹配任何可能的编码
            console.log('DEBUG: 不匹配任何编码 - 输入:', currentInputCode, '编码:', correctCodes);
            
            // 检查是否达到4个字符
            if (currentInputCode.length >= 4) {
                // 输入了4个字符但不匹配任何编码，错误
                document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                moveToNextCharacter();
                return;
            }
            
            // 还没达到4个字符，继续等待输入（不管对错，等输满4个字符或按空格）
            updateStatusBar();
        }

        function handleSpaceKey() {
            // 如果打字已完成，不再处理键盘事件
            if (isCompleted) {
                return;
            }

            console.log('DEBUG: 空格键按下 - currentInputCode:', currentInputCode, 'globalIdx:', globalIdx);
            var currentChar = contents[globalIdx - 1];
            
            // 英文模式：空格键直接匹配空格字符
            if (currentMode === 'english') {
                if (currentChar.char === ' ') {
                    markAsCorrect('c' + globalIdx);
                    moveToNextCharacter();
                } else {
                    document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                    moveToNextCharacter();
                }
                return;
            }
            
            // 如果是ASCII字符或标点符号，空格键标记为错误并跳过
            if (isAsciiChar(currentChar.char) || isPunctuationChar(currentChar.char)) {
                document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
                moveToNextCharacter();
                return;
            }
            
            // 检查当前字符是否有编码，如果没有则跳过
            if (currentChar.code === "???") {
                // 没有编码的字符直接跳过
                markAsCorrect('c' + globalIdx);
                moveToNextCharacter();
                return;
            }
            
            var correctCodes = currentChar.code;
            
            if (matchesAnyCode(currentInputCode, correctCodes)) {
                // 空格键按下时已经匹配，正确
                markAsCorrect('c' + globalIdx);
            } else {
                // 没有匹配（无论是否有输入），错误
                document.getElementById('c' + globalIdx).classList.replace("cursor", "wrong");
            }
            
            moveToNextCharacter();
        }

        function moveToPreviousCharacter() {
            // 重置当前输入
            currentInputCode = "";
            
            // 检查是否有上一个字符
            if (globalIdx <= 1) {
                return; // 已经是第一个字符，无法回退
            }
            
            // 获取当前字符元素
            var currentElement = document.getElementById('c' + globalIdx);
            if (!currentElement) {
                console.error('无法获取当前字符元素:', 'c' + globalIdx);
                return;
            }
            
            // 重置当前字符为初始状态
            if (currentElement.classList.contains('phrase-unit')) {
                currentElement.className = 'init phrase-unit';
            } else {
                currentElement.className = 'init';
            }
            
            // 回到上一个字符
            globalIdx -= 1;
            
            // 获取上一个字符元素
            var prevElement = document.getElementById('c' + globalIdx);
            if (!prevElement) {
                console.error('无法获取上一个字符元素:', 'c' + globalIdx);
                globalIdx += 1; // 恢复索引
                return;
            }
            
            // 重置上一个字符为光标状态
            if (prevElement.classList.contains('phrase-unit')) {
                prevElement.className = 'cursor phrase-unit';
            } else {
                prevElement.className = 'cursor';
            }
            
            // 重置字符开始显示的时间
            characterStartTime = Date.now();
            
            // 更新统计信息
            var correctNum = document.querySelectorAll('.correct').length;
            var errorNum = document.querySelectorAll('.wrong').length;
            var total = correctNum + errorNum;
            
            // 计算速度
            var currentTime = Date.now();
            var timeDifferenceInSeconds = startTime ? (currentTime - startTime) / 1000 : 0;
            
            var speedInfo = "";
            if (total > 0 && timeDifferenceInSeconds > 0) {
                var speed = total / timeDifferenceInSeconds * 60;
                var accuracy = correctNum / total * 100;
                
                // 儿童友好的鼓励信息
                var promot = "";
                if (timeDifferenceInSeconds > 10) {
                    if (speed >= 80 && accuracy > 95) {
                        promot = "🎉 太厉害了！你打字高手！ | ";
                    } else if (speed >= 60 && accuracy > 90) {
                        promot = "🌟 真棒！继续加油！ | ";
                    } else if (speed >= 40 && accuracy > 85) {
                        promot = "👍 不错哦！越来越熟练了！ | ";
                    } else if (accuracy > 80) {
                        promot = "💪 加油！你可以做得更好！ | ";
                    }
                }
                
                speedInfo = `${promot}速度：${speed.toFixed(2)}字/分钟 | 正确率：${accuracy.toFixed(2)}% | 正确：${correctNum} | 错误：${errorNum} | 总字数：${total}`;
            } else {
                speedInfo = "🎮 开始打字吧！看看你能得多少分！";
            }
            
            document.getElementById("statusbar").innerHTML = speedInfo;
            
            // 更新状态信息
            updateStatusBar();
        }

        function moveToNextCharacter() {
            // 重置当前输入
            currentInputCode = "";
            
            // 检查是否有下一个字符
            if (globalIdx < contents.length) {
                globalIdx += 1;
                document.getElementById('c' + globalIdx).classList.replace("init", "cursor");
                // 设置当前字符开始显示的时间
                characterStartTime = Date.now();
                // 更新状态栏
                updateStatusBar();
            } else {
                // 没有下一个字符，练习结束，显示完成对话框
                updateStatusBar();
                showCompletionDialog();
            }
        }
        
        // 显示完成对话框
        function showCompletionDialog() {
            isCompleted = true; // 标记打字已完成，阻止后续键盘事件
            
            const dialog = document.getElementById('completionDialog');
            const dialogContent = dialog.querySelector('.dialog-content');
            
            // 确保对话框处于完成状态（不是错误状态）
            restoreCompletionDialog();
            
            // 计算统计信息
            var correctNum = document.querySelectorAll('.correct').length;
            var errorNum = document.querySelectorAll('.wrong').length;
            var total = correctNum + errorNum;
            var currentTime = Date.now();
            var timeDifferenceInSeconds = startTime ? (currentTime - startTime) / 1000 : 0;
            
            var speed = 0;
            var accuracy = 0;
            
            if (total > 0 && timeDifferenceInSeconds > 0) {
                speed = total / timeDifferenceInSeconds * 60;
                accuracy = correctNum / total * 100;
            }
            
            // 更新对话框内容
            document.getElementById('dialogSpeed').textContent = speed.toFixed(1);
            document.getElementById('dialogAccuracy').textContent = accuracy.toFixed(1) + '%';
            
            // 根据表现显示不同的鼓励信息
            var message = "";
            if (accuracy >= 95 && speed >= 60) {
                message = "🏆 太厉害了！你打字高手！";
            } else if (accuracy >= 90 && speed >= 40) {
                message = "🌟 太棒了！继续保持！";
            } else if (accuracy >= 80) {
                message = "👍 做得不错！继续加油！";
            } else {
                message = "💪 继续努力，你会越来越好！";
            }
            document.getElementById('dialogMessage').textContent = message;
            
            // 清空并添加彩色纸屑
            var existingConfetti = dialogContent.querySelectorAll('.confetti');
            existingConfetti.forEach(c => c.remove());
            
            const colors = ['#4F46E5', '#F97316', '#10B981', '#EF4444', '#818CF8', '#FB923C'];
            for (var i = 0; i < 20; i++) {
                var confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                dialogContent.appendChild(confetti);
            }
            
            // 显示对话框
            dialog.classList.add('show');

            // 移除按钮焦点并禁用，防止键盘事件触发
            const continueBtn = dialog.querySelector('.dialog-btn');
            if (continueBtn) {
                continueBtn.blur();
                continueBtn.disabled = true;
            }
        }

        // 继续练习
        async function continueNext() {
            // 如果打字未完成（对话框未显示），不执行重启
            if (!isCompleted) {
                return;
            }
            
            var dialog = document.getElementById('completionDialog');
            
            // 启用按钮
            const continueBtn = dialog.querySelector('.dialog-btn');
            if (continueBtn) {
                continueBtn.disabled = false;
            }
            
            dialog.classList.remove('show');
            
            // 短暂延迟后重新开始
            setTimeout(async () => {
                // 在 restart 执行前重置完成标志，允许键盘事件处理
                isCompleted = false;
                await restart();
            }, 300);
        }
        
        // 显示错误对话框
        function showErrorDialog(errorMessage) {
            const dialog = document.getElementById('completionDialog');
            const dialogContent = dialog.querySelector('.dialog-content');
            
            // 更新对话框内容为错误信息
            dialog.querySelector('.dialog-emoji').textContent = '❌';
            dialog.querySelector('.dialog-title').textContent = '加载失败';
            dialog.querySelector('.dialog-message').textContent = errorMessage;
            
            // 隐藏统计信息
            dialog.querySelector('.dialog-stats').style.display = 'none';
            
            // 更新按钮文本和事件
            const button = dialog.querySelector('.dialog-btn');
            button.textContent = '重试';
            button.onclick = function() {
                dialog.classList.remove('show');
                setTimeout(async () => {
                    await restart();
                }, 300);
            };
            
            // 清空并添加简单的装饰
            var existingConfetti = dialogContent.querySelectorAll('.confetti');
            existingConfetti.forEach(c => c.remove());
            
            // 显示对话框
            dialog.classList.add('show');
        }
        
        // 恢复完成对话框的正常状态
        function restoreCompletionDialog() {
            const dialog = document.getElementById('completionDialog');
            const dialogContent = dialog.querySelector('.dialog-content');
            
            // 恢复对话框内容
            dialog.querySelector('.dialog-emoji').textContent = '🎉';
            dialog.querySelector('.dialog-title').textContent = '太棒了！';
            dialog.querySelector('.dialog-stats').style.display = 'flex';
            
            // 恢复按钮文本和事件
            const button = dialog.querySelector('.dialog-btn');
            button.textContent = '继续练习';
            button.onclick = continueNext;
        }
        
        // 初始化应用
        async function initApp() {
            document.getElementById('typingArea').innerHTML = "正在加载数据...";
            
            // 从URL读取模式
            const urlMode = getModeFromURL();
            if (urlMode) {
                currentMode = urlMode;
                console.log(`从URL读取模式: ${currentMode}`);
            }
            
            // 更新按钮样式
            updateModeButtons();
            
            // 更新打字区域样式
            updateTypingAreaStyle();
            
            try {
                const loaded = await loadWubiData();
                if (loaded) {
                    await restart();
                }
            } catch (error) {
                console.error('加载五笔数据失败:', error);
                document.getElementById('typingArea').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #dc2626;">
                        <h3 style="margin-bottom: 20px;">❌ 数据加载失败</h3>
                        <p style="margin-bottom: 10px;">${error.message}</p>
                        <p style="font-size: 14px; color: #6b7280;">请检查数据文件或刷新页面重试</p>
                    </div>
                `;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>

</html>
